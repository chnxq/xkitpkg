syntax = "proto3";

package conf;

option go_package = "github.com/chnxq/xkitpkg/conf/v1;conf";

import "google/protobuf/duration.proto";

// 中间件
message Middleware {
  // JWT白名单列表
  message WhiteList {
    repeated string prefix = 1;
    repeated string regex = 2;
    repeated string path = 3;
    repeated string match = 4;
  }
  // JWT校验
  message Auth {
    string method = 1; // JWT签名的算法，支持算法：HS256
    string key = 2; // JWT 秘钥

    optional google.protobuf.Duration access_token_expires = 3; // 访问令牌过期时间
    optional google.protobuf.Duration refresh_token_expires = 4; // 刷新令牌过期时间

    optional string access_token_key_prefix = 5; // 访问令牌键前缀
    optional string refresh_token_key_prefix  = 6; // 刷新令牌键前缀

    WhiteList white_list = 7; // JWT白名单列表(内置JWT+Casbin中间件时采用)
  }

  // 限流器
  message RateLimiter {
    string name = 1; // 限流器名字，支持：bbr。
    optional google.protobuf.Duration window = 2; // 统计窗口时长
    optional int32 bucket = 3; // 窗口桶数量
    optional int64 cpu_threshold = 4; // CPU 限流阈值，千分比，例如 800 表示 80%
    optional double cpu_quota = 5; // CPU 配额，无法正确探测时可手工指定
  }

  // 熔断器
  message CircuitBreaker {
    optional google.protobuf.Duration window = 1; // 统计窗口时长
    optional int64 request = 2; // 进入熔断计算的最小请求数
    optional int32 bucket = 3; // 窗口桶数量
    optional double success = 4; // 成功率阈值，0-1 之间
  }

  // 性能指标
  message Metrics {
    bool histogram = 1; // 直方图
    bool counter = 2; // 计数器
    bool gauge = 3; // 仪表盘
    bool summary = 4; // 摘要
  }

  RateLimiter limiter = 1;
  Metrics metrics = 2;
  Auth auth = 3;
  CircuitBreaker circuit_breaker = 4;

  bool enable_logging = 10; // 日志开关
  bool enable_recovery = 11; // 异常恢复
  bool enable_tracing = 12; // 链路追踪开关
  bool enable_validate = 13; // 参数校验开关
  bool enable_circuit_breaker = 14; // 熔断器
  bool enable_metadata = 15; // 元数据
}
