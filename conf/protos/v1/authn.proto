syntax = "proto3";

package conf;

option go_package = "github.com/chnxq/xkitpkg/conf/v1;conf";

// 认证配置。
message Authentication {
  // JWT 认证配置。
  message Jwt {
    // JWT 签名算法，例如 HS256。
    string method = 1;

    // JWT 签名密钥。
    string key = 2;
  }

  // OIDC 认证配置。
  message OIDC {
    // OIDC Issuer 地址。
    string issuer_url = 1;

    // OIDC Audience。
    string audience = 2;

    // OIDC 场景下用于校验 JWT 的签名算法。
    string method = 3;
  }

  // 预共享密钥认证配置。
  message PresharedKey {
    // 可接受的预共享密钥列表。
    repeated string valid_keys = 1;
  }

  // 用户注册默认归属配置。
  message Registration {
    // 默认租户 ID。
    uint32 default_tenant_id = 1;

    // 默认租户编码。
    string default_tenant_code = 2;

    // 默认角色编码。
    string default_role_code = 3;

    // 默认组织编码。
    string default_org_unit_code = 4;

    // 默认岗位编码。
    string default_position_code = 5;
  }

  // 通用第三方登录提供商配置。
  message SocialProvider {
    // 是否启用。
    bool enabled = 1;

    // 第三方应用标识。
    string client_id = 2;

    // 第三方应用密钥。
    string client_secret = 3;

    // 回调地址。
    string redirect_uri = 4;

    // 授权地址。
    string auth_url = 5;

    // 访问令牌交换地址。
    string token_url = 6;

    // 用户信息地址。
    string user_api_url = 7;

    // 默认授权范围。
    repeated string scopes = 8;
  }

  // 第三方登录配置。
  message SocialAuth {
    // GitHub 网页 OAuth。
    optional SocialProvider github = 1;

    // 钉钉网页登录。
    optional SocialProvider dingtalk = 2;

    // 微信网页登录。
    optional SocialProvider wechat_web = 3;

    // 微信小程序登录。
    optional SocialProvider wechat_miniapp = 4;

    // 支付宝网页登录 / 小程序登录。
    optional SocialProvider alipay = 5;

    // 抖音开放平台登录。
    optional SocialProvider douyin = 6;
  }

  // 认证类型，例如 jwt、oidc、preshared_key。
  string type = 1;

  // JWT 认证配置。
  optional Jwt jwt = 2;

  // OIDC 认证配置。
  optional OIDC oidc = 3;

  // 预共享密钥认证配置。
  optional PresharedKey preshared_key = 4;

  // 用户注册默认归属配置。
  optional Registration registration = 5;

  // 第三方登录配置。
  optional SocialAuth social_auth = 6;
}
