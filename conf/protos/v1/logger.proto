syntax = "proto3";

package conf;

import "google/protobuf/duration.proto";

option go_package = "github.com/chnxq/xkitpkg/conf/v1;conf";

// 日志
message Logger {
  // 日志类型
  enum Type {
    UNKNOWN = 0;

    ZAP = 1;
    LOGRUS = 2;
    FLUENTD = 3;
    ALIYUN = 4;
    TENCENT = 5;
    ZEROLOG = 6;
  }

  // Zap
  message Zap {
    string log_file_path = 1; // 日志文件路径
    string level = 2; // 日志等级
    bool log_to_console = 3; // 是否输出到控制台
    bool export_to_otel = 4; //日志是否导出到OTEL
    int32 max_size = 5; // 单个日志文件最大大小（MB）
    int32 max_age = 6; // 日志文件最大保存时间（天）
    int32 max_backups = 7; // 最大备份文件数
  }

  // logrus
  message Logrus {
    string level = 1; // 日志等级
    string formatter = 2; // 输出格式：text, json.
    string timestamp_format = 3; // 定义时间戳格式，例如："2006-01-02 15:04:05"
    bool disable_colors = 4; // 不需要彩色日志
    bool disable_timestamp = 5; // 不需要时间戳
  }

  // Flentd
  message Flentd {
    string endpoint = 1; // 公网接入地址
    string level = 2; //日志级别
    google.protobuf.Duration timeout = 4; //超时时间
    google.protobuf.Duration writeTimeout = 5; //写超时时间
    int32 bufferLimit = 6; //缓冲区限制
    int32 retryWait = 7; //重试等待时间
    int32 maxRetry = 8; //最大重试次数
    int32 maxRetryWait = 9; //最大重试等待时间
    string tagPrefix = 10; //标签前缀
    bool async = 11; //是否异步发送
    bool forceStopAsyncSend = 12; //是否强制停止异步发送
  }

  // 阿里云
  message Aliyun {
    string endpoint = 1; // 公网接入地址
    string project = 2; // 项目ID
    string access_key = 3; // 访问密钥ID
    string access_secret = 4; // 访问密钥
  }

  // 腾讯
  message Tencent {
    string endpoint = 1; // 公网接入地址
    string topic_id = 2; // 主题ID
    string access_key = 3; // 访问密钥ID
    string access_secret = 4; // 访问密钥
  }

  // Zerolog
  message Zerolog {
    string level = 1; // 日志等级

    string time_field_format = 2; // 定义时间戳格式，例如："2006-01-02 15:04:05"
    string timestamp_field_name = 3; // 时间戳字段名称
    string level_field_name = 4; // 日志等级字段名称
    string message_field_name = 5; // 日志消息字段名称

    string writer = 6; // 输出目标，默认stdout，可选：stdout, stderr, file
    string filename = 7; // 当writer为file时，指定日志文件名
  }

  string type = 1;

  optional Zap zap = 2;
  optional Logrus logrus = 3;
  optional Flentd fluentd = 4;
  optional Aliyun aliyun = 5;
  optional Tencent tencent = 6;
  optional Zerolog zerolog = 7;
}
